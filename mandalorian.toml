# ============================================
# MANDALORIAN — Starship Prompt
# ============================================

add_newline = true

format = """
[⟠ ](bold bright-white)$hostname$directory$git_branch$git_status$python$nodejs$rust
[⟡ ](bold bright-white) ❯
"""

[hostname]
ssh_only = false
format = "[MND-$hostname](bold bright-white) "

[directory]
style = "bold bright-white"
truncation_length = 3
read_only = " ⛔"
read_only_style = "bold bright-red"

[git_branch]
symbol = "⟠ "
style = "bold bright-white"
format = "[$symbol$branch]($style) "

[git_status]
style = "bold bright-white"
format = "[$all_status$ahead_behind]($style) "
ahead = "⇡${count}"
behind = "⇣${count}"
untracked = "⊘ "
modified = "✎ "
staged = "+"

[character]
success_symbol = "❯"
error_symbol = "❯"
style_success = "bold bright-white"
style_error = "bold bright-red"
